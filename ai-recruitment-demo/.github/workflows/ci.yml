name: CI

# Run on every push to main
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up the Python version that matches our target runtime
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies so repeated runs are faster
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install all project dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run the full test suite.
      # pytest exits with a non-zero code if any test fails,
      # which causes the workflow step (and the whole job) to fail.
      - name: Run pytest
        env:
          # Provide a dummy key so the Groq client can be instantiated.
          # All API calls are mocked in tests — no real key is needed.
          GROQ_API_KEY: ci-placeholder-key
        run: pytest tests/ -v

      # Verify that the mandatory EU AI Act Annex III compliance controls are
      # still present in the codebase after every push.
      - name: compliance-check
        run: |
          echo "[COMPLIANCE] Running EU AI Act Annex III checks..."

          # Check 1: audit log module must exist
          if find . -name "scorer.py" -path "*/services/*" | grep -q .; then
            echo "[COMPLIANCE] PASS: Audit log module found (services/scorer.py)"
          else
            echo "[COMPLIANCE] FAIL: No audit log module found"
            exit 1
          fi

          # Check 2: mlflow must be a declared dependency
          if grep -q "^mlflow" requirements.txt; then
            echo "[COMPLIANCE] PASS: MLflow found in dependencies"
          else
            echo "[COMPLIANCE] FAIL: MLflow not in dependencies"
            exit 1
          fi

          echo "[COMPLIANCE] PASS: Core compliance checks passed"

      # Warn (but do not fail) if the EU AI Act Article 13 model card is missing.
      - name: model-card-check
        run: |
          if [ -f "MODEL_CARD.md" ]; then
            echo "[INFO] MODEL_CARD.md found — Article 13 transparency document present"
          else
            echo "[WARNING] MODEL_CARD.md not found — required for EU AI Act Article 13 transparency"
          fi
